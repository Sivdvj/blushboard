services:
  blushboard:
    build: .

    container_name: blushboard

    restart: unless-stopped

    networks:
      - traefik-net

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.blushboard.rule=Host(`blushboard.sivv.me`)"
      - "traefik.http.routers.blushboard.entrypoints=websecure"
      - "traefik.http.routers.blushboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.blushboard.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-net"

networks:
  traefik-net:
    external: true
